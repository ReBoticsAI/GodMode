# Hub + host llama-server (external LLM)
#
# CUDA inference runs on the host (systemd / manual llama-server).
# Bridge attaches via LLAMA_EXTERNAL — it does not spawn llama-server in the container.
#
# Setup:
#   1. Put GGUF files in ./models
#   2. mkdir -p ./data ./plugins
#   3. cp .env.production.example .env.production  # set secrets
#   4. Start host llama-server on :8081 (see docs/LOCAL_LLM.md)
#   4b. Optional: host EmbeddingGemma on :8082 with EMBEDDINGS_* (agent memory RAG)
#   5. Optional: clone a plugin under ./plugins/my-plugin (built dist/)
#   6. docker compose -f docker-compose.hub-external-llm.yml up -d --build
#   7. Open http://localhost:8080 — Marketplace → Unofficial path e.g. /plugins/my-plugin
services:
  godmode:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:80"
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
      - ./models:/models:ro
      - ./plugins:/plugins
    environment:
      - PLATFORM_DATA_DIR=/data
      - DEPLOYMENT_MODE=hub
      - BRIDGE_HOST=127.0.0.1
      - AUTH_ALLOW_ANONYMOUS=false
      - AUTH_ALLOW_SIGNUP=true
      - LLAMA_MODEL_DIRS=/models
      - LLAMA_EXTERNAL=true
      - LLAMA_SERVER_HOST=host.docker.internal
      - LLAMA_SERVER_PORT=8081
      - LLAMA_TOOL_MODE=native
      # Host EmbeddingGemma on :8082 (see docs/LOCAL_LLM.md)
      - EMBEDDINGS_ENABLED=true
      - EMBEDDINGS_EXTERNAL=true
      - EMBEDDINGS_SERVER_HOST=host.docker.internal
      - EMBEDDINGS_PORT=8082
      # Optional: auto-discover a plugin (semicolon-separated). Or use Marketplace UI.
      # - GODMODE_PLUGIN_PATH=/plugins/my-plugin
    restart: unless-stopped
