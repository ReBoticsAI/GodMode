# Publish a GHCR image for SaaS / hub staging without desktop, bare-metal, or GitHub Releases.
# Use this while iterating on INSTALLATION_SURFACE=saas (e.g. Z440 beside a private hub).
#
# Tags pushed:
#   ghcr.io/<org>/godmode:saas-staging          (mutable pointer)
#   ghcr.io/<org>/godmode:sha-<full-commit>     (immutable ref)
# Job summary prints the multi-arch digest when arm64 is included; amd64-only by default.
#
# Trigger: push to main (relevant paths) or Actions → Publish SaaS image → Run workflow

name: Publish SaaS image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA). Empty = this workflow revision.
        required: false
        type: string
        default: ""
  push:
    branches: [main, master]
    paths:
      - "apps/bridge/**"
      - "apps/web/**"
      - "packages/**"
      - "deploy/Dockerfile"
      - "deploy/nginx.conf"
      - "deploy/docker-entrypoint.sh"
      - "deploy/docker-compose.saas-staging.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish-saas-image.yml"

concurrency:
  group: publish-saas-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/release-validation.yml
    with:
      ref: ${{ inputs.ref || github.sha }}

  metadata:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.meta.outputs.commit }}
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - id: meta
        env:
          SHA: ${{ github.sha }}
          INPUT_REF: ${{ inputs.ref }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_REF}" ]]; then
            commit=$(git rev-parse HEAD)
          else
            commit="$SHA"
          fi
          base=$(node -p "'v' + require('./package.json').version")
          version="${base}-saas.$(date -u +%Y%m%d).${commit:0:12}"
          {
            echo "commit=${commit}"
            echo "version=${version}"
            echo "image=ghcr.io/${REPOSITORY,,}"
          } >> "$GITHUB_OUTPUT"

  image:
    needs: metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.commit }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            GODMODE_VERSION=${{ needs.metadata.outputs.version }}
            GODMODE_COMMIT=${{ needs.metadata.outputs.commit }}
          tags: |
            ${{ needs.metadata.outputs.image }}:saas-staging
            ${{ needs.metadata.outputs.image }}:sha-${{ needs.metadata.outputs.commit }}
            ${{ needs.metadata.outputs.image }}:${{ needs.metadata.outputs.version }}
          labels: |
            org.opencontainers.image.revision=${{ needs.metadata.outputs.commit }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=GodMode SaaS staging
      - uses: sigstore/cosign-installer@v3
      - name: Sign image digest
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: ${{ needs.metadata.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"
      - name: Summary
        env:
          IMAGE: ${{ needs.metadata.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
          COMMIT: ${{ needs.metadata.outputs.commit }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          {
            echo "## SaaS staging image"
            echo ""
            echo "- Immutable: \`${IMAGE}@${DIGEST}\`"
            echo "- Tags: \`saas-staging\`, \`sha-${COMMIT}\`, \`${VERSION}\`"
            echo "- Commit: \`${COMMIT}\`"
            echo ""
            echo "Z440 / staging pull:"
            echo "\`\`\`bash"
            echo "GODMODE_IMAGE=${IMAGE}@${DIGEST}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
