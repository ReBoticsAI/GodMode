name: Unified release

on:
  # Nightly publish at 12:00 AM America/Denver during MDT (UTC-6 → 06:00 UTC).
  # In MST (UTC-7) the same cron is 11:00 PM local.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

concurrency:
  group: release-${{ github.event_name == 'push' && github.ref || 'nightly' }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/release-validation.yml
    with:
      ref: ${{ github.sha }}

  metadata:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.release.outputs.channel }}
      commit: ${{ steps.release.outputs.commit }}
      image: ${{ steps.release.outputs.image }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Require verified annotated stable tag
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          tag_object=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq '.object.type + " " + .object.sha')
          read -r object_type object_sha <<<"$tag_object"
          [[ "$object_type" == "tag" ]] || {
            echo "Stable releases require an annotated signed tag, not a lightweight tag" >&2
            exit 1
          }
          verified=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$object_sha" --jq '.verification.verified')
          [[ "$verified" == "true" ]] || {
            echo "Stable release tag signature is not verified by GitHub" >&2
            exit 1
          }
          node scripts/release/validate-stable-tag.mjs "$TAG"
      - id: release
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "$REF_TYPE" == "tag" ]]; then
            [[ "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
              echo "Stable tags must be exactly vX.Y.Z" >&2
              exit 1
            }
            version="$REF_NAME"
            channel=stable
          else
            base=$(node -p "'v' + require('./package.json').version")
            version="${base}-nightly.$(date -u +%Y%m%d).${SHA:0:12}"
            channel=nightly
          fi
          {
            echo "version=$version"
            echo "channel=$channel"
            echo "commit=$SHA"
            echo "image=ghcr.io/${REPOSITORY,,}"
          } >> "$GITHUB_OUTPUT"

  image:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          # Native arm64 avoids QEMU SIGILL (exit 132) while compiling better-sqlite3/duckdb.
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.commit }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Platform pair label
        id: prep
        run: |
          pair="${{ matrix.platform }}"
          echo "pair=${pair//\//-}" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            GODMODE_VERSION=${{ needs.metadata.outputs.version }}
            GODMODE_COMMIT=${{ needs.metadata.outputs.commit }}
          labels: |
            org.opencontainers.image.revision=${{ needs.metadata.outputs.commit }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          outputs: type=image,name=${{ needs.metadata.outputs.image }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ steps.prep.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  image-manifest:
    needs: [metadata, image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: image-digest-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: manifest
        env:
          IMAGE: ${{ needs.metadata.outputs.image }}
          VERSION: ${{ needs.metadata.outputs.version }}
          COMMIT: ${{ needs.metadata.outputs.commit }}
        run: |
          set -euo pipefail
          digests=()
          for file in /tmp/digests/*; do
            digests+=("${IMAGE}@sha256:$(basename "$file")")
          done
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:sha-${COMMIT}" \
            "${digests[@]}"
          digest=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{printf "%s" .Manifest.Digest}}')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - uses: sigstore/cosign-installer@v3
      - name: Sign immutable image digest
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: ${{ needs.metadata.outputs.image }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"

  bare-metal:
    needs: metadata
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x64
            os: linux
            extension: tar.gz
          - runner: windows-latest
            platform: windows-x64
            os: windows
            extension: zip
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.commit }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build runtime
        run: |
          npm run build:packages
          npm run build -w @godmode/bridge
          npm run build -w @godmode/web
          npm prune --omit=dev
      - name: Package bare-metal runtime
        env:
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
          RELEASE_COMMIT: ${{ needs.metadata.outputs.commit }}
        run: node scripts/release/package-bare-metal.mjs ${{ matrix.platform }} release-out
      - name: Smoke bare-metal runtime
        timeout-minutes: 15
        run: node scripts/release/smoke-bare-metal.mjs release-out/godmode-${{ matrix.os }}-bare-metal-${{ needs.metadata.outputs.version }}.${{ matrix.extension }}
      - name: Generate bundle SBOM
        uses: anchore/sbom-action@v0
        with:
          path: release-out
          format: spdx-json
          output-file: release-out/godmode-${{ needs.metadata.outputs.version }}-${{ matrix.platform }}.sbom.spdx.json
          upload-artifact: false
      - name: Generate provenance statement
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
          RELEASE_COMMIT: ${{ needs.metadata.outputs.commit }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          node -e 'const fs=require("fs"); const p=`release-out/godmode-${process.env.RELEASE_VERSION}-${process.env.PLATFORM}.provenance.json`; fs.writeFileSync(p, JSON.stringify({_type:"https://in-toto.io/Statement/v1",subject:[{name:`godmode-${process.env.PLATFORM}`,digest:{gitCommit:process.env.RELEASE_COMMIT}}],predicateType:"https://slsa.dev/provenance/v1",predicate:{buildDefinition:{buildType:"https://github.com/ReBoticsAI/GodMode/.github/workflows/release.yml",externalParameters:{version:process.env.RELEASE_VERSION,platform:process.env.PLATFORM}},runDetails:{builder:{id:"https://github.com/actions/runner"}}}},null,2)+"\n")'
      - uses: actions/upload-artifact@v4
        with:
          name: bare-metal-${{ matrix.platform }}
          path: release-out/*
          if-no-files-found: error
          retention-days: 7

  desktop:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x64
          - runner: macos-latest
            platform: darwin-arm64
          # macos-13 is retired; Intel x64 builds use macos-15-intel (last GH-hosted Intel image).
          - runner: macos-15-intel
            platform: darwin-x64
          - runner: ubuntu-latest
            platform: linux-x64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.commit }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build runtime and desktop shell
        run: |
          npm run build:packages
          npm run build -w @godmode/bridge
          npm run build -w @godmode/web
          npm run build -w @godmode/desktop
      - name: Package desktop installer
        env:
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
          RELEASE_COMMIT: ${{ needs.metadata.outputs.commit }}
          DESKTOP_PLATFORM: ${{ matrix.platform }}
          # Nightly ships unsigned; empty CSC_* secrets still confuse electron-builder on macOS.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ${{ needs.metadata.outputs.channel == 'stable' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ needs.metadata.outputs.channel == 'stable' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ needs.metadata.outputs.channel == 'stable' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ needs.metadata.outputs.channel == 'stable' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ needs.metadata.outputs.channel == 'stable' && secrets.APPLE_TEAM_ID || '' }}
        run: node scripts/release/package-desktop.mjs release-out
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            release-out/godmode-*-desktop-*
            release-out/*.exe
            release-out/*.dmg
            release-out/*.AppImage
            release-out/*.deb
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [metadata, image-manifest, bare-metal, desktop]
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.commit }}
      - uses: actions/download-artifact@v4
        with:
          pattern: bare-metal-*
          path: release-assets
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true
      - name: Create release manifest and checksums
        env:
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
          RELEASE_COMMIT: ${{ needs.metadata.outputs.commit }}
          RELEASE_PUBLISHED_AT: ${{ github.event.head_commit.timestamp }}
          IMAGE_REPOSITORY: ${{ needs.metadata.outputs.image }}
          IMAGE_DIGEST: ${{ needs.image-manifest.outputs.digest }}
        run: |
          node scripts/release/create-manifest.mjs release-assets release-assets/release-manifest.json
          cd release-assets
          shopt -s nullglob
          primary=(godmode-*-desktop-*.exe godmode-*-desktop-*.dmg godmode-*-desktop-*.AppImage godmode-*-desktop-*.deb)
          primary+=(godmode-*-bare-metal-*.tar.gz godmode-*-bare-metal-*.zip)
          sha256sum "${primary[@]}" release-manifest.json > SHA256SUMS
      - uses: sigstore/cosign-installer@v3
      - name: Sign installers, bundles, manifest, and checksums
        working-directory: release-assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          for artifact in godmode-*-desktop-*.exe godmode-*-desktop-*.dmg godmode-*-desktop-*.AppImage godmode-*-desktop-*.deb \
            godmode-*-bare-metal-*.tar.gz godmode-*-bare-metal-*.zip; do
            [[ -f "$artifact" ]] || continue
            cosign sign-blob --yes --bundle "$artifact.bundle" "$artifact"
          done
          cosign sign-blob --yes --bundle release-manifest.json.bundle release-manifest.json
          cosign sign-blob --yes --bundle SHA256SUMS.bundle SHA256SUMS
      - id: attest
        name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release-assets/godmode-*-desktop-*.exe
            release-assets/godmode-*-desktop-*.dmg
            release-assets/godmode-*-desktop-*.AppImage
            release-assets/godmode-*-desktop-*.deb
            release-assets/godmode-*-bare-metal-*.tar.gz
            release-assets/godmode-*-bare-metal-*.zip
            release-assets/release-manifest.json
            release-assets/SHA256SUMS
      - name: Include GitHub provenance bundle
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: cp "$BUNDLE_PATH" release-assets/github-provenance.sigstore.json
      - name: Pack verification materials
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          node scripts/release/pack-verification.mjs release-assets "$VERSION"
          VERIFY="release-assets/godmode-verification-${VERSION}.tar.gz"
          cosign sign-blob --yes --bundle "${VERIFY}.bundle" "$VERIFY"
      - name: Preserve immutable stable release assets
        if: needs.metadata.outputs.channel == 'stable'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Stable release $VERSION already exists; refusing to overwrite immutable assets" >&2
            exit 1
          fi
      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.metadata.outputs.version }}
          CHANNEL: ${{ needs.metadata.outputs.channel }}
          COMMIT: ${{ needs.metadata.outputs.commit }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          args=(--repo "$GITHUB_REPOSITORY" --target "$COMMIT" --title "GodMode $VERSION")
          if [[ "$CHANNEL" == "nightly" ]]; then
            NOTES="Automated nightly release for ${COMMIT}. Download one installer for your OS (or a bare-metal archive). Trust the signed release-manifest.json for updates. Optional godmode-verification-*.tar.gz holds auditor materials."
            args+=(--prerelease --notes "$NOTES")
          else
            args+=(--generate-notes --latest)
          fi
          gh release create "$VERSION" "${args[@]}"
          uploads=(
            release-assets/godmode-*-desktop-*.exe
            release-assets/godmode-*-desktop-*.dmg
            release-assets/godmode-*-desktop-*.AppImage
            release-assets/godmode-*-desktop-*.deb
            release-assets/godmode-*-bare-metal-*.tar.gz
            release-assets/godmode-*-bare-metal-*.zip
            release-assets/godmode-verification-*.tar.gz
            release-assets/godmode-verification-*.tar.gz.bundle
            release-assets/release-manifest.json
            release-assets/release-manifest.json.bundle
          )
          gh release upload "$VERSION" "${uploads[@]}" --repo "$GITHUB_REPOSITORY"
      - name: Publish nightly channel pointer
        if: needs.metadata.outputs.channel == 'nightly'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT: ${{ needs.metadata.outputs.commit }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view nightly --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create nightly \
              --repo "$GITHUB_REPOSITORY" \
              --target "$COMMIT" \
              --title "GodMode nightly channel" \
              --prerelease \
              --notes "Mutable discovery pointer. Verify its signed manifest and use only immutable versioned artifacts."
          fi
          gh release upload nightly \
            release-assets/release-manifest.json \
            release-assets/release-manifest.json.bundle \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
